# Claude Provider Configurations
# Managed by `claude-provider add`
#


[provider.codesome]
url = "https://v2.codesome.cn"
token_var = "CODESOME_TOKEN"

[provider.glm]
url = "https://open.bigmodel.cn/api/anthropic"
token_var = "GLM_TOKEN"
haiku_model = "glm-5.1"
sonnet_model = "glm-5.1"
opus_model = "glm-5.1"
extra_flags = "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1"

[provider.z]
url = "https://api.z.ai/api/anthropic"
token_var = "GLM_TOKEN"
haiku_model = "glm-4.7"
sonnet_model = "glm-5.1"
opus_model = "glm-5.1 "
extra_flags = "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1"

[provider.anyrouter]
url = "https://anyrouter.top"
token_var = "ANYROUTER_TOKEN"

[provider.anyrouter-cn]
url = "https://pmpjfbhq.cn-nb1.rainapp.top"
token_var = "ANYROUTER_TOKEN"

[provider.moonshot]
url = "https://api.moonshot.cn/anthropic"
token_var = "MOONSHOT_TOKEN"

[provider.modelscope]
url = "https://api-inference.modelscope.cn"
